<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Radio - Rhythm Intelligence</title>
    
    <!-- Import fonturi similare cu rominimal.club -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d0e12;
            --accent-color: #ff5f5f; 
            --text-main: #e0e0e0;
            --text-dim: #767676;
            --card-bg: #1a1b24;
            --vinyl-speed: 2s;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        /* --- VISUAL ELEMENTS: VINYL --- */
        .vinyl-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 40px;
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #333 0%, #111 25%, #050505 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            animation: rotate var(--vinyl-speed) linear infinite;
            animation-play-state: paused;
            border: 2px solid #1a1b24;
        }

        .label {
            width: 80px;
            height: 80px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Audiowide', cursive;
            font-size: 10px;
            color: white;
            z-index: 2;
        }

        .tonearm {
            position: absolute;
            top: -20px;
            right: -10px;
            width: 120px;
            height: 160px;
            transform-origin: 85% 15%;
            transform: rotate(-20deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* Starea activa cand muzica canta */
        .playing .tonearm { transform: rotate(12deg); }
        .playing .vinyl-disc { animation-play-state: running; }

        /* --- TYPOGRAPHY --- */
        .artist {
            font-family: 'Audiowide', cursive;
            font-size: 1.6rem;
            color: var(--accent-color);
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .title {
            font-weight: 300;
            color: var(--text-dim);
            margin: 10px 0 30px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* --- INTERACTIVE ELEMENTS --- */
        .play-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent-color);
            padding: 15px 50px;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            letter-spacing: 2px;
            outline: none;
        }

        .play-btn:hover {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 0 20px rgba(255, 95, 95, 0.4);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Efect de litere imprastiate (Scatter) */
        .char {
            display: inline-block;
            transition: transform 0.6s ease-out;
        }

        .playing .char {
            transform: translate(calc(var(--tx) * 1px), calc(var(--ty) * 1px)) rotate(calc(var(--rot) * 1deg));
        }
    </style>
</head>
<body>

    <div class="container" id="player-container">
        <div class="vinyl-wrapper">
            <!-- Bratul pickup-ului -->
            <svg class="tonearm" viewBox="0 0 100 150">
                <path d="M85 20 L85 120 L45 145" fill="none" stroke="#888" stroke-width="5" stroke-linecap="round"/>
                <rect x="38" y="135" width="14" height="20" rx="3" fill="#222" />
                <circle cx="85" cy="20" r="10" fill="#444" />
            </svg>

            <!-- Discul de vinil -->
            <div class="vinyl-disc">
                <div class="label">
                    <span>LIVE</span>
                    <span style="font-size: 6px; margin-top: 5px;">ROMINIMAL</span>
                </div>
            </div>
        </div>

        <div class="track-info">
            <!-- Numele artistului cu efect scatter -->
            <h1 class="artist" id="artist-scatter"></h1>
            <p class="title">RHYTHM INTELLIGENCE / 124 BPM</p>
        </div>

        <button class="play-btn" id="play-btn">POWER ON</button>
        
        <!-- Stream Audio Direct -->
        <audio id="audio-stream" src="https://r4.rominimal.club/listen/rominimal.club/radio.m4a" crossorigin="anonymous"></audio>
    </div>

    <script>
        const playBtn = document.getElementById('play-btn');
        const container = document.getElementById('player-container');
        const audio = document.getElementById('audio-stream');
        const artistDisplay = document.getElementById('artist-scatter');
        const artistName = "ROminimal";

        // Functie pentru generarea literelor cu pozitii random (efectul vizual semnatura)
        function setupScatter() {
            artistDisplay.innerHTML = '';
            artistName.split('').forEach(char => {
                const span = document.createElement('span');
                span.classList.add('char');
                span.innerText = char === ' ' ? '\u00A0' : char;
                
                // Variabile CSS pentru animatie random
                span.style.setProperty('--tx', (Math.random() - 0.5) * 30);
                span.style.setProperty('--ty', (Math.random() - 0.5) * 15);
                span.style.setProperty('--rot', (Math.random() - 0.5) * 40);
                
                artistDisplay.appendChild(span);
            });
        }

        // Gestionare Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => {
                    console.error("Eroare la redare. Verifica conexiunea la stream:", e);
                });
                container.classList.add('playing');
                playBtn.innerText = "POWER OFF";
            } else {
                audio.pause();
                container.classList.remove('playing');
                playBtn.innerText = "POWER ON";
            }
        });

        // Initializeaza textul la incarcare
        setupScatter();
    </script>
</body>
</html>
